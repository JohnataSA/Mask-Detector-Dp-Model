# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: ./dataset/  # dataset root dir
train: mask/train/train  # train images (relative to 'path') 128 images
val: mask/train/val  # val images (relative to 'path') 128 images
test:  # test images (optional)

# Classes
names:
  0: with_mask
  1: without_mask
  2: mask_weared_incorrect

# Número de classes
nc: 3

# Peso das classes (para balancear o treinamento)
class_weights: [1.0, 1.0, 3.0]  # Maior peso para mask_weared_incorrect 